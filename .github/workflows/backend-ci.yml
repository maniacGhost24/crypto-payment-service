name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build and Test
        working-directory: backend/payment-core/payment-core
        env:
            BASE_RPC_URL: https://base-mainnet.g.alchemy.com/v2/dummy
            USDC_CONTRACT: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
        run: mvn clean test