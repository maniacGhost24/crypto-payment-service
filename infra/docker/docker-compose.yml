version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: crypto-payments-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: cryptopayments
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      TZ: Asia/Kolkata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: